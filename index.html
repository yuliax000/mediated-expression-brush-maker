<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>brushMaker</title>
    <script src="https://unpkg.com/konva@10/konva.min.js"></script>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
</head>
<body>
<main>

<div class="stageContainer" id="stageContainer">


    <div class="functionContainer" id="functionContainer">
        <div class="previewContainer" id="previewContainer">
            <p>brush preview</p>
            <div class="brushPreviewWindow" id="burshPreviewWindow"></div>
            <button class="saveToBrush" id="saveToBrush">save to brush</button>
        </div>
        <div class="libraryContainer" id="libraryContainer">
            <p>Brush Library</p>
            <div class="brushLibrary" id="brushLibrary"></div>
        </div>

    </div>


    <div class="canvasContainer" id="canvasContainer">
        <div class="toolbarContainer" id="toolbarContainer">
            <div class="toolbar" id="toolbar">
                <div class="tools" id="tools"></div>
            </div>

        </div>
        <div class="canvas" id="canvas">canvas</div>
    </div>



</div>

</main>
</body>
</html>
