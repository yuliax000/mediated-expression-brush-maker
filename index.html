<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>brushMaker</title>
    <script src="https://unpkg.com/konva@10/konva.min.js"></script>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer></script>
</head>
<body>
<main>

<div class="stageContainer" id="stageContainer">


    <div class="functionContainer" id="functionContainer">
        <div class="previewContainer" id="previewContainer">
            <p>brush preview</p>
            <div class="brushPreviewWindow" id="burshPreviewWindow"></div>
            <button class="saveToBrush" id="saveToBrush">save to brush</button>
        </div>
        <div class="libraryContainer" id="libraryContainer">
            <p>Brush Library</p>
            <div class="brushLibrary" id="brushLibrary"></div>
        </div>

    </div>

<div class="mainContainer" id="mainContainer">
    <div class="modeContainer" id="modeContainer">
        <button id="defaultModeBtn">Default Mode</button>
        <button id="generativeModeBtn">Generative Mode</button>
    </div>
    <div class="canvasContainer" id="canvasContainer">
    <div class="toolbarContainer" id="toolbarContainer">
        <div class="toolbar" id="toolbar">
            <div class="tools" id="tools">
                <button id="brushBtn">Brush</button>
                <button id="eraserBtn">Eraser</button>
            </div>
        </div>

    </div>
        <div class="canvas" id="canvas">canvas</div>

    </div>
    <div class="saveContainer" id="saveContainer" >
        <button class="export" id="export">Export PNG</button>
    </div>
    </div>

    </div>





</main>
</body>
</html>
